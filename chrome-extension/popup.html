<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Sender</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 240px;
      padding: 16px;
      margin: 0;
      background: #fff;
      color: #1a1a1a;
    }
    h2 { font-size: 14px; margin: 0 0 12px; font-weight: 600; }
    .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .label { color: #666; }
    .value { font-weight: 500; }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      background: #f0fdf4;
      color: #15803d;
    }
    .status.sending { background: #fefce8; color: #854d0e; }
  </style>
</head>
<body>
  <h2>Instagram DM Sender</h2>
  <div class="row">
    <span class="label">Enviadas hoje</span>
    <span class="value" id="sentToday">—</span>
  </div>
  <div class="row">
    <span class="label">Limite diário</span>
    <span class="value" id="dailyLimit">—</span>
  </div>
  <div class="status" id="statusMsg">A carregar…</div>
  <script src="popup.js"></script>
</body>
</html>
